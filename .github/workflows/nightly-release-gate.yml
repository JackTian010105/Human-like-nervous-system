name: Nightly Release Gate

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      window_minutes:
        description: "Metrics snapshot window (minutes)"
        required: false
        default: "10080"
      run_1000_gate:
        description: "Run strict 1000-node gate after nightly drill"
        required: false
        type: boolean
        default: false

jobs:
  nightly-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: command_neural
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d command_neural"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/command_neural
      PSQL_BIN: psql
      EXTERNAL_API_TOKEN: dev-external-token
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Nightly auto-remediation drill
        id: nightly_drill
        run: |
          set +e
          WINDOW_MINUTES="${{ github.event.inputs.window_minutes || '10080' }}" pnpm gate:release:auto-remediate:nightly
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          # 95 means "WARN, no PASS transition". Keep pipeline running to auto-handle issue workflow.
          if [[ "$code" -ne 0 && "$code" -ne 95 ]]; then
            echo "Unexpected drill failure exit code: $code"
            exit "$code"
          fi

      - name: Parse release gate decision
        id: gate_parse
        if: always()
        run: |
          REPORT="docs/release-acceptance-latest.md"
          overall="UNKNOWN"
          full="UNKNOWN"
          scale="UNKNOWN"
          external="UNKNOWN"
          if [[ -f "$REPORT" ]]; then
            overall="$(grep -E "^- OverallDecision:" "$REPORT" | tail -n 1 | sed 's/^- OverallDecision:[[:space:]]*//')"
            full="$(grep -E "^- FullDrillGate:" "$REPORT" | tail -n 1 | sed 's/^- FullDrillGate:[[:space:]]*//')"
            scale="$(grep -E "^- ScalabilityGate:" "$REPORT" | tail -n 1 | sed 's/^- ScalabilityGate:[[:space:]]*//')"
            external="$(grep -E "^- ExternalMetricsGate:" "$REPORT" | tail -n 1 | sed 's/^- ExternalMetricsGate:[[:space:]]*//')"
          fi
          blocked="false"
          if [[ "$overall" != "PASS" ]]; then
            blocked="true"
          fi
          echo "overall=$overall" >> "$GITHUB_OUTPUT"
          echo "full=$full" >> "$GITHUB_OUTPUT"
          echo "scale=$scale" >> "$GITHUB_OUTPUT"
          echo "external=$external" >> "$GITHUB_OUTPUT"
          echo "blocked=$blocked" >> "$GITHUB_OUTPUT"

      - name: Optional strict 1000-node gate
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_1000_gate == 'true' }}
        run: pnpm gate:release:strict:1000

      - name: Upload release gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-release-gate-artifacts
          path: |
            docs/reports/**
            docs/release-acceptance-latest.md
            docs/release-gate-auto-remediation-drill-latest.md
            docs/release-gate-auto-remediation-history.md
            docs/external-metrics-latest.json
            docs/external-metrics-weekly-trend.md
            docs/scalability-baseline-latest.json
          if-no-files-found: warn

      - name: Publish gate summary
        if: always()
        run: |
          REPORT="docs/release-acceptance-latest.md"
          {
            echo "## Nightly Release Gate Summary"
            echo ""
            if [[ -f "$REPORT" || "${{ steps.gate_parse.outputs.overall }}" != "" ]]; then
              echo "- OverallDecision: ${{ steps.gate_parse.outputs.overall }}"
              echo "- FullDrillGate: ${{ steps.gate_parse.outputs.full }}"
              echo "- ScalabilityGate: ${{ steps.gate_parse.outputs.scale }}"
              echo "- ExternalMetricsGate: ${{ steps.gate_parse.outputs.external }}"
              echo "- DrillExitCode: ${{ steps.nightly_drill.outputs.exit_code }}"
              echo ""
              echo "### Artifacts"
              echo "- See uploaded artifact: \`nightly-release-gate-artifacts\`"
            else
              echo "- Release report not found at \`$REPORT\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create issue on gate failure
        if: always() && steps.gate_parse.outputs.blocked == 'true'
        uses: actions/github-script@v7
        env:
          GATE_OVERALL: ${{ steps.gate_parse.outputs.overall }}
          GATE_FULL: ${{ steps.gate_parse.outputs.full }}
          GATE_SCALE: ${{ steps.gate_parse.outputs.scale }}
          GATE_EXTERNAL: ${{ steps.gate_parse.outputs.external }}
        with:
          script: |
            const gateLabel = 'nightly-gate';
            const fs = require('fs');
            const reportPath = 'docs/release-acceptance-latest.md';
            const overall = process.env.GATE_OVERALL || 'UNKNOWN';
            const full = process.env.GATE_FULL || 'UNKNOWN';
            const scale = process.env.GATE_SCALE || 'UNKNOWN';
            const external = process.env.GATE_EXTERNAL || 'UNKNOWN';

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const day = new Date().toISOString().slice(0, 10);
            const title = `[Nightly Gate] BLOCKED ${day}`;
            const body = [
              'Nightly release gate failed.',
              '',
              `- OverallDecision: ${overall}`,
              `- FullDrillGate: ${full}`,
              `- ScalabilityGate: ${scale}`,
              `- ExternalMetricsGate: ${external}`,
              '',
              `- Workflow Run: ${runUrl}`,
              '',
              'Please review artifacts: `nightly-release-gate-artifacts` and run remediation checklist if needed.'
            ].join('\n');

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: gateLabel
              });
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: gateLabel,
                  color: 'b60205',
                  description: 'Nightly release gate tracking'
                });
              } else {
                throw err;
              }
            }

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const matched = existing.find((issue) => issue.title === title);
            if (matched) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: matched.number,
                labels: [gateLabel]
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: matched.number,
                body: [
                  'Another nightly gate failure was detected.',
                  '',
                  body
                ].join('\n')
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [gateLabel]
              });
            }

      - name: Auto-close issue on gate recovery
        if: always() && steps.gate_parse.outputs.blocked == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const day = new Date().toISOString().slice(0, 10);
            const title = `[Nightly Gate] BLOCKED ${day}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const matched = openIssues.find((issue) => issue.title === title);
            if (!matched) {
              core.info(`No open nightly gate issue to close for ${day}`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: matched.number,
              body: [
                'Nightly gate recovered to PASS. Closing this issue.',
                '',
                `- Recovery run: ${runUrl}`
              ].join('\n')
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: matched.number,
              state: 'closed'
            });

      - name: Fail workflow when gate is blocked
        if: always() && steps.gate_parse.outputs.blocked == 'true'
        run: |
          echo "Nightly release gate blocked: OverallDecision=${{ steps.gate_parse.outputs.overall }}"
          exit 1
