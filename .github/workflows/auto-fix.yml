name: Auto Fix (Self-healing)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && !startsWith(github.event.workflow_run.head_branch, 'auto-fix-') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get failure logs
        uses: actions/github-script@v7
        id: logs
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId
            });
            let logText = "";
            for (const job of jobs.jobs) {
              const { data: log } = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                job_id: job.id
              });
              logText += log.toString() + "\n";
            }
            core.setOutput("log", logText.slice(-20000));

      - name: Ask LLM to fix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LOG: ${{ steps.logs.outputs.log }}
        run: |
          python - <<'PY'
          import os,requests
          log = os.environ["LOG"]
          prompt = f"""You are an expert CI fixer.
          Given the failure log below, propose a minimal patch.
          Only output a unified diff.

          LOG:
          {log}
          """
          payload = {
              "model": "gpt-4.1-mini",
              "messages": [
                  {"role":"system","content":"You output ONLY a unified diff."},
                  {"role":"user","content":prompt}
              ]
          }
          r = requests.post(
              "https://api.openai.com/v1/chat/completions",
              headers={"Authorization": f"Bearer {os.environ['OPENAI_API_KEY']}"},
              json=payload
          )
          r.raise_for_status()
          diff = r.json()["choices"][0]["message"]["content"]
          open("/tmp/fix.patch","w").write(diff)
          PY

      - name: Apply patch
        run: |
          git apply /tmp/fix.patch

      - name: Commit & PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="auto-fix-${{ github.run_id }}"
          git checkout -b "$branch"
          git config user.name "auto-fix-bot"
          git config user.email "auto-fix-bot@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-fix CI failures"
          git push origin "$branch"
          gh pr create --fill --title "Auto-fix CI failures" --body "Generated by auto-fix workflow."
